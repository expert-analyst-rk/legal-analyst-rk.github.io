<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Strategist | Expert Legal Solutions in RK</title>
    <style>
        :root {
            --bg-space: #070d19;          
            --bg-card: rgba(11, 19, 41, 0.7); 
            --color-mint: #ffffff;        
            --color-purple: #caa96a;      
            --color-ochre: #caa96a;       
            --text-muted: rgba(255, 255, 255, 0.85); 
            --text-sub: rgba(255, 255, 255, 0.9);   
            --radius-terminal: 8px;       
            --glow-orange: 0 4px 15px rgba(202, 169, 106, 0.15); 
            --transition-smooth: all 0.3s ease;
        }

        body { 
            font-family: 'Lora', 'Georgia', serif; 
            background-color: var(--bg-space); 
            background-image: linear-gradient(rgba(11, 19, 41, 0.35), rgba(11, 19, 41, 0.6)), url('bg-space.png');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: var(--text-muted); 
            margin: 0; padding: 0; line-height: 1.8; letter-spacing: 0.5px; 
            -webkit-text-size-adjust: 100%; position: relative; overflow-x: hidden; 
        }

        /* GLOBAL OUTLINE FOR SHARP TEXT READABILITY */
        header h1, section h2, h2, .subtitle, header .subtitle, header .subtitle div, .manifesto-text, [class*="manifesto"], [style*="italic"] {
            text-shadow: 1px 1px 3px #000000, -1px -1px 3px #000000, 
                         1px -1px 3px #000000, -1px 1px 3px #000000, 
                         0 3px 6px #000000 !important;
        }

        /* OUTLINE FOR CARDS AND BUTTONS */
        .card h3, h3, .step-num, .principle-title, .logo-box text, .btn, header .btn, a.btn {
            text-shadow: 1px 1px 2px #000000, -1px -1px 2px #000000, 
                         1px 1px 3px #000000, -1px 1px 3px #000000,
                         0 2px 4px #000000 !important;
        }

        .nav-panel {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            max-width: 100% !important; 
            margin: 0 auto !important;
            padding: 20px 40px !important; 
            width: 100% !important;
            box-sizing: border-box !important;
        }

        header { 
            text-align: center; 
            margin-bottom: 50px; 
            padding: 10px 20px 40px 20px !important; 
            background: transparent;
            border: none; 
            box-shadow: none;
        }

        header h1 {
            color: #caa96a !important;
            font-family: 'Lora', 'Georgia', serif !important;
            font-size: 2.1rem !important; 
            font-weight: 400 !important;
            letter-spacing: 4px !important; 
            margin: 30px 0 20px 0 !important;
            text-transform: uppercase;
        }

        header .subtitle { 
            color: var(--text-sub) !important;
            font-size: 1.1rem !important;

            margin-bottom: 35px; 
            letter-spacing: 1.5px;

            color: #caa96a !important; 
            padding: 16px 38px !important; 
            border: 1.5px solid #caa96a !important;
            border-radius: var(--radius-terminal) !important; 
            text-decoration: none !important; 
            font-family: 'Lora', serif !important;
            font-size: 0.95rem !important;
            font-weight: bold !important;
            letter-spacing: 2px !important; 
            text-transform: uppercase;
            box-shadow: none !important; 
            transition: var(--transition-smooth) !important; 
            text-align: center; 
        }
        
        .btn:hover, header .btn:hover { 
            background: #caa96a !important; 
            color: #070d19 !important;
            box-shadow: var(--glow-orange) !important; 
            transform: translateY(-2px); 
        }

            display: flex !important; 
            gap: 10px !important; 
        }

        .lang-btn {

            border: 1px solid rgba(202, 169, 106, 0.4) !important; 
            color: rgba(255, 255, 255, 0.8) !important; 
            padding: 8px 18px !important; 
            border-radius: 4px !important; 
            cursor: pointer !important; 
            font-family: 'Lora', serif !important; 
            font-size: 0.85rem !important; 
            letter-spacing: 1px !important; 
            text-decoration: none !important;
            backdrop-filter: blur(5px) !important;

        .lang-btn:hover { 
            border-color: #caa96a !important;

        }

            color: #caa96a !important;

            margin-bottom: 35px !important; 
            letter-spacing: 3px !important; 
            text-transform: uppercase; 
            text-align: center !important; 
        }

            display: flex !important;
            flex-direction: column !important;
            justify-content: flex-start !important;
            text-align: left !important;

            transition: var(--transition-smooth) !important;
            box-sizing: border-box !important;

            margin-bottom: 10px !important;

        }
