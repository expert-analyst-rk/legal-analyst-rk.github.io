<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Правовой стратег | Экспертные решения в РК</title>
    <style>
        :root {
            --bg-space: #070d19;          
            --bg-card: rgba(255, 255, 255, 0.02); 
            --color-mint: #ffffff;        
            --color-purple: #caa96a;      
            --color-ochre: #caa96a;       
            --text-muted: rgba(255, 255, 255, 0.75); 
            --text-sub: rgba(255, 255, 255, 0.85);   
            --radius-terminal: 8px;       
            --glow-orange: 0 4px 15px rgba(202, 169, 106, 0.15); 
            --transition-smooth: all 0.3s ease;
        }

        body { 
            font-family: 'Lora', 'Georgia', serif; 
            background-color: var(--bg-space); 
            background-image: linear-gradient(rgba(11, 19, 41, 0.35), rgba(11, 19, 41, 0.6)), url('bg-space.png');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: var(--text-muted); 
            margin: 0; padding: 0; line-height: 1.8; letter-spacing: 0.5px; 
            -webkit-text-size-adjust: 100%; position: relative; overflow-x: hidden; 
        }

        header { 
            text-align: center; 
            margin-bottom: 50px; 
            padding: 40px 20px; 
            background: transparent;
            border: none; 
            box-shadow: none;
        }

        header h1 {
            color: var(--color-mint) !important;
            font-size: 2.4rem !important;
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 25px;
            text-transform: uppercase;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.7);
        }

        header .subtitle, .subtitle span { 
            color: var(--text-sub) !important;
            font-size: 1.2rem !important;
            font-weight: 300 !important;
            margin-bottom: 35px; 
            letter-spacing: 1.5px; 
            text-transform: uppercase; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.6) !important; 
        }

        header p, .text-block, section p { 
            color: #ffffff !important; 
            font-size: 1.05rem; 
            max-width: 720px; 
            margin: 0 auto 40px auto !important; 
            text-align: justify; 
            font-weight: 500; 
            line-height: 1.75; 
            letter-spacing: 0.3px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6); 
        }

        .btn, header .btn, a.btn { 
            display: inline-block !important; 
            background: transparent !important; 
            color: #caa96a !important; 
            padding: 15px 35px !important; 
            border: 1px solid rgba(202, 169, 106, 0.6) !important;
            border-radius: var(--radius-terminal) !important; 
            text-decoration: none !important; 
            font-family: 'Lora', serif !important;
            font-size: 0.95rem !important;
            letter-spacing: 2px !important; 
            text-transform: uppercase;
            box-shadow: none !important; 
            transition: var(--transition-smooth) !important; 
            text-align: center; 
        }
        
        .btn:hover, header .btn:hover { 
            background: #caa96a !important; 
            color: #070d19 !important;
            box-shadow: var(--glow-orange) !important; 
            transform: translateY(-2px); 
        }

        .lang-switcher {
            background: rgba(7, 13, 25, 0.6) !important;
            padding: 6px 12px !important;
            border-radius: 4px !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .lang-switcher a {
            color: rgba(255, 255, 255, 0.8) !important;
            font-family: 'Lora', serif !important;
            font-size: 0.9rem !important;
            padding: 4px 10px !important;
            text-decoration: none !important;
            transition: var(--transition-smooth) !important;
        }

        .lang-switcher a[style*="background"], .lang-switcher a.active {
            background: #caa96a !important;
            color: #070d19 !important;
            border-radius: 2px !important;
            font-weight: bold !important;
        }

        section { margin-bottom: 50px; }
        
        h2 { 
            font-size: 1.6rem; 
            font-weight: 700; 
            color: #ffffff; 
            margin-bottom: 30px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            text-align: center; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .card-grid {
            display: grid !important;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)) !important;
            gap: 24px !important; 
            margin-top: 40px !important;
            align-items: stretch !important; 
        }

        .card {
            background: rgba(11, 19, 41, 0.65) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            padding: 30px !important; 
            border-radius: var(--radius-terminal) !important; 
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: flex-start !important;
            text-align: left !important; 
            height: 100% !important;
            transition: var(--transition-smooth) !important;
        }

        .card:hover {
            border-color: rgba(202, 169, 106, 0.4) !important;
            transform: translateY(-4px) !important;
            box-shadow: 0 10px 30px rgba(202, 169, 106, 0.05) !important;
        }

        .card h3 {
            color: var(--color-mint) !important;
            font-size: 1.3rem !important;
            font-weight: 400 !important;
            margin-top: 0 !important;
            margin-bottom: 15px !important;
            line-height: 1.4 !important;
        }

        .card p, .card li {
            margin: 0 !important;
            line-height: 1.6 !important;
            color: rgba(255, 255, 255, 0.7) !important;
        }

        .docs-list { margin: 15px 0 0 0; padding-left: 20px; color: #caa96a; font-size: 0.9rem; list-style-type: '○ '; }
        .docs-list li { margin-bottom: 8px; color: #cbd5e1; }

        .timeline { 
            display: flex !important; 
            flex-direction: column !important; 
            gap: 20px !important; 
            max-width: 800px !important;
            margin: 0 auto !important;
        }
        
        .step-box { 
            background: rgba(255, 255, 255, 0.02) !important;
            border-left: 3px solid #caa96a !important; 
            padding: 25px !important;
            margin-bottom: 20px !important;
            border-radius: 0 8px 8px 0 !important;
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
        }
        
        .step-num { 
            color: #caa96a !important; 
            font-family: 'Lora', serif !important;
            font-size: 0.95rem !important;
            text-transform: uppercase !important;
            letter-spacing: 2px !important;
            margin-bottom: 10px !important;
            font-weight: bold !important;
        }
        
        .step-text { 
            font-size: 1.1rem !important;
            color: var(--text-muted) !important;
            margin: 0 !important;
            text-align: left !important;
        }

        .grid-principles { 
            display: grid !important; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)) !important; 
            gap: 25px !important; 
            margin-top: 40px !important;
        }
        
        .principle-box { 
            background: rgba(11, 19, 41, 0.45) !important; 
            border: 1px solid rgba(255, 255, 255, 0.05) !important; 
            padding: 25px !important; 
            border-radius: 6px !important; 
            backdrop-filter: blur(10px) !important; 
            -webkit-backdrop-filter: blur(10px) !important;
            transition: var(--transition-smooth) !important;
        }
        
        .principle-box:hover { 
            border-color: rgba(202, 169, 106, 0.4) !important;
            box-shadow: 0 10px 30px rgba(202, 169, 106, 0.05) !important;
        }
        
        .principle-title { 
            color: var(--color-mint) !important; 
            font-family: 'Lora', serif !important; 
            font-size: 1.25rem !important; 
            font-weight: 400 !important; 
            margin-bottom: 12px !important; 
            letter-spacing: 0.5px !important;
            text-transform: none !important; 
        }
        
        .principle-desc { 
            font-size: 0.95rem !important; 
            color: rgba(255, 255, 255, 0.7) !important; 
            margin: 0 !important; 
            line-height: 1.6 !important;
        }

        .refuse-box { 
            max-width: 780px !important;
            margin: 0 auto !important;
            background: rgba(255, 74, 74, 0.03) !important;
            border: 1px solid rgba(255, 74, 74, 0.15) !important;
            padding: 30px !important;
            border-radius: 6px !important;
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            text-align: center !important;
            color: var(--text-muted) !important;
            font-size: 1.1rem !important;
            line-height: 1.8 !important;
        }

        .contacts-block { 
            text-align: center !important;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
                    padding: 0 !important;
    }

    /* Премиальная двухколоночная сетка для контактов и регламента */
    .contact-buttons {
        margin: 0;
        max-width: 100%;
        display: flex !important;
        flex-direction: column !important;
        justify-content: space-between !important;
        gap: 15px !important;
    }

    /* Элегантные матовые кнопки связи */
    .contact-link { 
        display: block !important;
        text-align: left !important;
        padding: 15px 20px !important;
        border: 1px solid rgba(202, 169, 106, 0.3) !important;
        color: #caa96a !important;
        text-decoration: none !important;
        border-radius: 4px !important;
        background: rgba(11, 19, 41, 0.65) !important;
        backdrop-filter: blur(10px) !important;
        -webkit-backdrop-filter: blur(10px) !important;
        font-family: 'Lora', serif !important;
        letter-spacing: 0.5px !important;
        font-size: 1rem !important;
        font-weight: normal !important;
        text-transform: none !important;
        transition: var(--transition-smooth) !important;
    }

    .contact-link:hover { 
        border-color: rgba(202, 169, 106, 0.6) !important;
        background: rgba(11, 19, 41, 0.8) !important;
        box-shadow: var(--glow-orange) !important;
        transform: translateY(-2px);
    }

    /* Панель навигации меню */
    .nav-bar {
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        margin-bottom: 40px !important;
        padding: 15px 30px !important;
        background: rgba(11, 19, 41, 0.65) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        border-radius: 6px !important;
        backdrop-filter: blur(10px) !important;
        -webkit-backdrop-filter: blur(10px) !important;
    }

    .logo-box { 
        display: flex !important;
        align-items: center !important;
        filter: drop-shadow(0 4px 15px rgba(202, 169, 106, 0.2)) !important;
    }
</style>
    </head>
<body>
              <header style="text-align: center; padding-top: 60px;">
        <div class="logo-box" style="margin-bottom: 30px; justify-content: center;">
            <!-- Полностью исправленный SVG-логотип: теперь золото подгружается на 100% -->
            <svg width="70" height="70" viewBox="0 0 100 100" fill="none" xmlns="http://w3.org">

                <path d="M50 2 L98 50 L50 98 L2 50 Z" stroke="url(#goldGlaze)" stroke-width="1.5" stroke-linejoin="round"/>
                <text x="32" y="58" font-family="'Lora', serif" font-size="32" fill="url(#goldGlaze)" font-weight="400">L</text>
                <text x="52" y="66" font-family="'Lora', serif" font-size="32" fill="url(#goldGlaze)" font-style="italic" font-weight="400">S</text>
                <defs>
                    <linearGradient id="goldGlaze" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#caa96a"/> <stop offset="50%" stop-color="#99793d"/> <stop offset="100%" stop-color="#e8cf9b"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        
        <h1>ПРАВОВОЙ СТРАТЕГ</h1>
        <div class="subtitle">Разобраться в законе. Защитить свои права. Действовать уверенно.</div>
